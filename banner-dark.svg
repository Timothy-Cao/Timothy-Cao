<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240" role="img" aria-label="Visit my actual site: TIMCAO.COM">
  <style>
    .cursor { animation: blink 2s steps(2) infinite; }
    @keyframes blink {
      0%, 49%   { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .arrow-left  { transform-box: fill-box; transform-origin: center; animation: poke-right 2.4s ease-in-out infinite; }
    .arrow-right { transform-box: fill-box; transform-origin: center; animation: poke-left  2.4s ease-in-out infinite; }
    @keyframes poke-right {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(14px); }
    }
    @keyframes poke-left {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(-14px); }
    }
  </style>

  <circle cx="828" cy="28" r="6" fill="#ef4444"/>
  <circle cx="850" cy="28" r="6" fill="#22d3ee"/>
  <circle cx="872" cy="28" r="6" fill="#22c55e"/>

  <text x="450" y="100" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="500" fill="#71717a" text-anchor="middle" letter-spacing="8">VISIT  MY  ACTUAL  SITE</text>

  <text class="arrow-left"  x="170" y="170" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="600" fill="#71717a" text-anchor="middle">→</text>
  <text class="arrow-right" x="730" y="170" font-family="ui-sans-serif, system-ui, sans-serif" font-size="38" font-weight="600" fill="#71717a" text-anchor="middle">←</text>

  <text x="450" y="175" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, 'Courier New', monospace" font-size="68" font-weight="800" text-anchor="middle" letter-spacing="4">
    <tspan fill="#fafafa">TIMCAO.COM</tspan><tspan class="cursor" fill="#ef4444" dx="4">|</tspan>
  </text>

  <text x="450" y="222" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="12" font-weight="400" fill="#71717a" text-anchor="middle" letter-spacing="1">GH Repos privated starting June 2026</text>
</svg>
